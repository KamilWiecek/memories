<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memories</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 1.5rem; color: #222; }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
    #record-btn {
      padding: .55rem 1.2rem; font-size: .95rem; cursor: pointer;
      background: #c53030; color: #fff; border: none; border-radius: 6px;
      display: inline-flex; align-items: center; gap: .4rem;
    }
    #record-btn:hover { background: #9b2c2c; }
    #record-btn.recording { background: #4a5568; }
    #record-btn.recording:hover { background: #2d3748; }
    #status { margin: .6rem 0 1.5rem; font-size: .85rem; color: #718096; min-height: 1.1em; }
    .memory { border-bottom: 1px solid #eee; padding: .8rem 0; }
    .memory:last-child { border-bottom: none; }
    .memory-meta { font-size: .75rem; color: #a0aec0; margin-bottom: .3rem; display: flex; gap: .75rem; }
    .memory-status { text-transform: uppercase; letter-spacing: .03em; font-weight: 600; }
    .memory-status.done { color: #48bb78; }
    .memory-status.processing, .memory-status.pending { color: #ed8936; }
    .memory-status.failed { color: #fc8181; }
    .memory-text { line-height: 1.5; }
    .memory-text.placeholder { color: #a0aec0; font-style: italic; }
    #empty { color: #a0aec0; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Memories</h1>

  <button id="record-btn" onclick="toggleRecord()">&#9679; Record</button>
  <div id="status"></div>
  <div id="memories"></div>

<script>
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

let mediaRecorder = null;
let chunks = [];

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    setStatus('Microphone access denied');
    return;
  }

  chunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    const btn = document.getElementById('record-btn');
    btn.classList.remove('recording');
    btn.innerHTML = '&#9679; Record';
    setStatus('Uploading…');
    await upload(new Blob(chunks, { type: mediaRecorder.mimeType }), mediaRecorder.mimeType);
  };

  mediaRecorder.start();
  const btn = document.getElementById('record-btn');
  btn.classList.add('recording');
  btn.innerHTML = '&#9632; Stop';
  setStatus('Recording…');
}

async function upload(blob, mimeType) {
  const form = new FormData();
  form.append('audio', blob, 'recording' + extFor(mimeType));
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) { setStatus('Upload failed (' + res.status + ')'); return; }
    setStatus('Uploaded — transcription pending');
    await loadMemories();
  } catch (e) {
    setStatus('Upload error: ' + e.message);
  }
}

function extFor(mime) {
  if (!mime) return '.audio';
  if (mime.includes('webm')) return '.webm';
  if (mime.includes('ogg'))  return '.ogg';
  if (mime.includes('mp4'))  return '.mp4';
  return '.audio';
}

async function loadMemories() {
  try {
    const res = await fetch('/api/memories');
    if (!res.ok) { setStatus('Failed to load memories (' + res.status + ')'); return; }
    render(await res.json());
  } catch (e) {
    setStatus('Failed to load memories');
  }
}

function render(memories) {
  const el = document.getElementById('memories');
  if (!memories || !memories.length) {
    el.innerHTML = '<p id="empty">No memories yet — hit Record to add one.</p>';
    return;
  }
  el.innerHTML = memories.map(m => {
    const date = new Date(m.created_at).toLocaleString();
    const isDone = m.status === 'done';
    const textClass = isDone ? '' : ' placeholder';
    const text = isDone ? escHtml(m.transcript || '') : m.status + '…';
    return `<div class="memory">
      <div class="memory-meta">
        <span>${date}</span>
        <span class="memory-status ${m.status}">${m.status}</span>
      </div>
      <div class="memory-text${textClass}">${text}</div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

loadMemories();
setInterval(loadMemories, 10000);
</script>
</body>
</html>
