<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memories</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 1.5rem; color: #222; }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
    .toolbar { display: flex; gap: .5rem; align-items: flex-start; margin-bottom: 1rem; }
    #record-btn {
      padding: .55rem 1.2rem; font-size: .95rem; cursor: pointer; white-space: nowrap;
      background: #c53030; color: #fff; border: none; border-radius: 6px;
    }
    #record-btn:hover { background: #9b2c2c; }
    #record-btn.recording { background: #4a5568; }
    #record-btn.recording:hover { background: #2d3748; }
    .text-input-wrap { display: flex; gap: .4rem; flex: 1; flex-wrap: wrap; }
    #text-input { flex: 1; min-width: 120px; padding: .45rem .6rem; border: 1px solid #cbd5e0; border-radius: 6px; font: inherit; font-size: .9rem; }
    #memory-date { padding: .45rem .6rem; border: 1px solid #cbd5e0; border-radius: 6px; font: inherit; font-size: .9rem; color: #555; }
    #add-text-btn { padding: .45rem .9rem; background: #2b6cb0; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; white-space: nowrap; }
    #add-text-btn:hover { background: #2c5282; }
    #status { margin-bottom: 1.2rem; font-size: .85rem; color: #718096; min-height: 1.1em; }
    .memory { border-bottom: 1px solid #eee; padding: .8rem 0; position: relative; }
    .memory:last-child { border-bottom: none; }
    .memory-meta { font-size: .75rem; color: #a0aec0; margin-bottom: .3rem; display: flex; gap: .75rem; align-items: center; }
    .memory-status { text-transform: uppercase; letter-spacing: .03em; font-weight: 600; }
    .memory-status.done { color: #48bb78; }
    .memory-status.processing, .memory-status.pending { color: #ed8936; }
    .memory-status.failed { color: #fc8181; }
    .btn-delete { margin-left: auto; background: none; border: none; cursor: pointer; color: #cbd5e0; font-size: .95rem; padding: 0 .2rem; line-height: 1; }
    .btn-delete:hover { color: #fc8181; }
    .memory-text { line-height: 1.5; cursor: pointer; }
    .memory-text:hover { background: #f7fafc; border-radius: 3px; }
    .memory-text.placeholder { color: #a0aec0; font-style: italic; cursor: default; }
    .memory-text.placeholder:hover { background: none; }
    .edit-area { width: 100%; min-height: 80px; padding: .4rem .5rem; border: 1px solid #cbd5e0; border-radius: 4px; font: inherit; font-size: .95rem; line-height: 1.5; resize: vertical; }
    .edit-actions { display: flex; gap: .5rem; margin-top: .4rem; }
    .btn-save { padding: .3rem .8rem; background: #3182ce; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; }
    .btn-save:hover { background: #2b6cb0; }
    .btn-cancel { padding: .3rem .8rem; background: #edf2f7; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; }
    .btn-cancel:hover { background: #e2e8f0; }
    #empty { color: #a0aec0; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Memories</h1>

  <div class="toolbar">
    <button id="record-btn" onclick="toggleRecord()">&#9679; Record</button>
    <div class="text-input-wrap">
      <input id="text-input" type="text" placeholder="Type a memory…">
      <input id="memory-date" type="date">
      <button id="add-text-btn" onclick="addText()">Add</button>
    </div>
  </div>
  <div id="status"></div>
  <div id="memories"></div>

<script>
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Recording ────────────────────────────────────────────────────────────────

let mediaRecorder = null;
let chunks = [];

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    setStatus('Microphone access denied');
    return;
  }
  chunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    const btn = document.getElementById('record-btn');
    btn.classList.remove('recording');
    btn.innerHTML = '&#9679; Record';
    setStatus('Uploading…');
    await uploadAudio(new Blob(chunks, { type: mediaRecorder.mimeType }), mediaRecorder.mimeType);
  };
  mediaRecorder.start();
  const btn = document.getElementById('record-btn');
  btn.classList.add('recording');
  btn.innerHTML = '&#9632; Stop';
  setStatus('Recording…');
}

async function uploadAudio(blob, mimeType) {
  const form = new FormData();
  form.append('audio', blob, 'recording' + extFor(mimeType));
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) { setStatus('Upload failed (' + res.status + ')'); return; }
    setStatus('Uploaded — transcription pending');
    await loadMemories();
  } catch (e) {
    setStatus('Upload error: ' + e.message);
  }
}

function extFor(mime) {
  if (!mime) return '.audio';
  if (mime.includes('webm')) return '.webm';
  if (mime.includes('ogg'))  return '.ogg';
  if (mime.includes('mp4'))  return '.mp4';
  return '.audio';
}

// ── Text create ──────────────────────────────────────────────────────────────

async function addText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;
  const date = document.getElementById('memory-date').value; // YYYY-MM-DD or ''
  try {
    const res = await fetch('/api/memories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript: text, date }),
    });
    if (!res.ok) { setStatus('Create failed (' + res.status + ')'); return; }
    input.value = '';
    setStatus('');
    await loadMemories();
  } catch (e) {
    setStatus('Create error: ' + e.message);
  }
}

document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addText();
});

// ── List ─────────────────────────────────────────────────────────────────────

async function loadMemories() {
  try {
    const res = await fetch('/api/memories');
    if (!res.ok) { setStatus('Failed to load memories (' + res.status + ')'); return; }
    render(await res.json());
  } catch (e) {
    setStatus('Failed to load memories');
  }
}

function render(memories) {
  const el = document.getElementById('memories');
  if (!memories || !memories.length) {
    el.innerHTML = '<p id="empty">No memories yet.</p>';
    return;
  }
  el.innerHTML = memories.map(m => {
    const date = new Date(m.created_at).toLocaleString();
    const isDone = m.status === 'done';
    const textClass = isDone ? '' : ' placeholder';
    const text = isDone ? escHtml(m.transcript || '') : m.status + '…';
    const clickable = isDone ? ` onclick="startEdit('${m.id}', this)" title="Click to edit"` : '';
    return `<div class="memory" data-id="${m.id}">
      <div class="memory-meta">
        <span>${date}</span>
        <span class="memory-status ${m.status}">${m.status}</span>
        <button class="btn-delete" onclick="deleteMemory('${m.id}', this)" title="Delete">&#10005;</button>
      </div>
      <div class="memory-text${textClass}"${clickable}>${text}</div>
    </div>`;
  }).join('');
}

// ── Edit ─────────────────────────────────────────────────────────────────────

function startEdit(id, textEl) {
  const textarea = document.createElement('textarea');
  textarea.className = 'edit-area';
  textarea.value = textEl.innerText;

  const actions = document.createElement('div');
  actions.className = 'edit-actions';
  actions.innerHTML = '<button class="btn-save">Save</button><button class="btn-cancel">Cancel</button>';
  actions.querySelector('.btn-save').onclick = () => saveEdit(id, textarea.value, textEl, textarea, actions);
  actions.querySelector('.btn-cancel').onclick = () => { actions.remove(); textarea.replaceWith(textEl); };

  textEl.replaceWith(textarea);
  textarea.after(actions);
  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
}

async function saveEdit(id, newText, textEl, textarea, actions) {
  actions.querySelector('.btn-save').disabled = true;
  try {
    const res = await fetch('/api/memories/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript: newText }),
    });
    if (!res.ok) { setStatus('Save failed (' + res.status + ')'); actions.querySelector('.btn-save').disabled = false; return; }
    const m = await res.json();
    textEl.innerHTML = escHtml(m.transcript || '');
    actions.remove();
    textarea.replaceWith(textEl);
    setStatus('');
  } catch (e) {
    setStatus('Save error: ' + e.message);
    actions.querySelector('.btn-save').disabled = false;
  }
}

// ── Delete ────────────────────────────────────────────────────────────────────

async function deleteMemory(id, btn) {
  if (!confirm('Delete this memory?')) return;
  try {
    const res = await fetch('/api/memories/' + id, { method: 'DELETE' });
    if (!res.ok) { setStatus('Delete failed (' + res.status + ')'); return; }
    btn.closest('.memory').remove();
    if (!document.querySelector('.memory')) {
      document.getElementById('memories').innerHTML = '<p id="empty">No memories yet.</p>';
    }
  } catch (e) {
    setStatus('Delete error: ' + e.message);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

document.getElementById('memory-date').value = new Date().toISOString().slice(0, 10);

loadMemories();
setInterval(loadMemories, 10000);
</script>
</body>
</html>
